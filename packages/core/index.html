<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8">
		<meta name="viewport" content="width=device-width, initial-scale=1.0">
		<title>Document</title>
		<script>
		"use strict";

		// Stub: A tiny inline function in the HTML `<head>` that acts as a proxy.
		((w, n) => {
			w[n] =
				w[n] ||
				((...args) => {
					if (!w[n].q) {
						w[n].q = [];
					}
					w[n].q.push(args);
				});
		})(window, "MySDK");

		// Try triggering the SDK before it's initialized
		window.MySDK("track", "hello_from_html");
		</script>
		<script defer src="dist/index.global.js"></script>
	</head>
	<body>
		<button type="button" data-track id="add-button">Add Button</button>

		<script>
		"use strict";

		const addButton = document.getElementById("add-button");

		let counter = 0;
		addButton.addEventListener("click", () => {
			const newButton = document.createElement("button");
			newButton.type = "button";
			newButton.dataset.track = "true";
			newButton.id = `new-button-${counter++}`;
			newButton.textContent = `Click me ${counter}`;
			document.body.appendChild(newButton);
		});
		</script>
	</body>
</html>
